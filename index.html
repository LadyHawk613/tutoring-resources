<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Practice Exams Dashboard</title>
    <style>
        /* General page setup */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #F07167; /* A warm coral color */
            color: #333333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Container for the menu - WIDENED to fit 3 columns */
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 800px; /* Changed from 450px to 800px */
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #222222;
            margin-bottom: 25px;
        }

        /* Menu item list styling - TURNED INTO A 3-COLUMN GRID */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            
            display: grid; /* Tells the list to use a grid layout */
            grid-template-columns: repeat(3, 1fr); /* Creates 3 columns of equal width */
            gap: 15px; /* Puts a 15px space between all buttons */
        }

        /* Removed 'margin-bottom' from "li" because the grid 'gap' handles it now */
        li {
            margin: 0; 
        }

        /* Styling links to look like clean buttons */
        a {
            display: block;
            padding: 12px 20px;
            background-color: #0081A7; /* Clean blue button color */
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        /* Interactive hover effects */
        a:hover {
            background-color: #00afb9; /* Lighter blue on hover */
        }
        
        a:active {
            transform: scale(0.98); /* Slight click feedback */
        }
    </style>
</head>

<body>
    <!-- Added the 'container' wrapper so your styles apply correctly -->
    <div class="container">
        <h1>Select a Math Practice Exam</h1>
        <ul>
            <li><a href="trigonometry.html">Trigonometry</a></li>
            <li><a href="pre-calculus.html">Pre-Calculus</a></li>
            <li><a href="math-2.html">Math 2</a></li>
            <li><a href="algebra.html">Algebra 1</a></li>
            <li><a href="geometry.html">Geometry</a></li>
            <li><a href="calculus.html">Calculus</a></li>
            <li><a href="4th-grade-math.html">4th Grade Math</a></li>
        </ul>
    </div>
</body>
</html>
