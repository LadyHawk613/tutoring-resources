    <style>
        /* General page setup */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #F07167; /* A warm coral color */
            color: #333333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Container for the menu */
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #222222;
        }

        /* Menu item list styling */
        ul {
            list-style-type: none;
            padding: 0;
            margin: 20px 0 0 0;
        }

        li {
            margin-bottom: 15px;
        }

        /* Styling links to look like clean buttons */
        a {
            display: block;
            padding: 12px 20px;
            background-color: #0081A7; /* Clean blue button color */
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        /* Interactive hover effects */
        a:hover {
            background-color: #00afb9; /* Lighter blue on hover */
        }
        
        a:active {
            transform: scale(0.98); /* Slight click feedback */
        }
    </style>
